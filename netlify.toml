# Netlify configuration for the DAQ_Numerique_2025 monorepo.
# The portfolio is a static site (no build step) living in the portfolio/ subfolder.
#
# IMPORTANT: this Netlify site's base directory is "portfolio", and the `publish`
# path is resolved RELATIVE TO base. So publish must be "." (the base dir itself),
# NOT "portfolio" — otherwise Netlify looks for portfolio/portfolio and the deploy
# fails with "Deploy directory 'portfolio/portfolio' does not exist".
[build]
  base = "portfolio"
  publish = "."
  command = ""
  # Resolved relative to base → portfolio/netlify/functions.
  # The CV save function holds the GitHub token; set GITHUB_TOKEN and
  # EDITOR_PASSWORD in Site settings → Environment variables.
  functions = "netlify/functions"
