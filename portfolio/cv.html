<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="CV interactif d'Atanda Abdullahi — Ingénieur Vision par Ordinateur & Edge-AI. Éditable dans le navigateur et imprimable en PDF (A4, une page)." />
  <title>CV — Atanda Abdullahi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/tw-config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <style>
    /* ====== CV sheet — print-exact styles (mm units), website theme on white ====== */
    :root {
      --paper: #ffffff;
      --paper2: #dbeed5;     /* sidebar tint — light green matching PDF */
      --inkx: #11151a;
      --mutedx: #4a5461;
      --linex: #c8d6cb;
      --accentx: #1f6b40;    /* green — graphic elements */
      --greenx: #1b5935;     /* deep green */
    }
    .sheet-wrap { padding: 6.5rem 1rem 4rem; display: grid; place-items: center; }
    .sheet {
      width: 210mm; height: 297mm; flex: none; position: relative;
      background: var(--paper); color: var(--inkx);
      font-family: 'Inter', sans-serif; font-size: 9pt; line-height: 1.45;
      display: grid; grid-template-columns: 75mm 1fr;
      overflow: hidden; border-radius: 6px;
      box-shadow: 0 40px 90px rgba(0,0,0,.55), 0 0 0 1px rgba(0,0,0,.08);
    }
    
    .side { position: relative; background: var(--paper2); padding: 12mm 8mm 8mm; overflow: hidden; }
    .mainc { position: relative; padding: 12mm 10mm 8mm; overflow: hidden; }

    .cv-header { margin-bottom: 6mm; }
    .cv-name { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 26pt; line-height: 1.1; letter-spacing: -0.01em; color: #111; }
    .cv-title { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 13pt; color: var(--greenx); margin-top: 2mm; }
    .cv-tagline { display: none; } /* Hidden as per new design */

    .cv-contacts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 6mm;
      row-gap: 2mm;
      margin-top: 4mm;
      font-size: 8pt;
      font-weight: 500;
      color: #111;
    }
    .cv-contacts .crow { display: flex; flex-direction: row; align-items: center; gap: 2.2mm; margin-bottom: 0; }
    .cv-contacts .clabel { display: none; }
    .cv-contacts .cvalue { display: inline-block; color: #222; font-size: 8pt; line-height: 1.35; text-decoration: none; }
    .cv-contacts .cvalue[href]:hover { text-decoration: underline; color: var(--greenx); }
    body.editing .cv-contacts .cvalue { pointer-events: none; text-decoration: none; color: #222; }
    
    .cv-contacts .cicon { display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .cv-contacts .cicon svg { display: none; width: 3.6mm; height: 3.6mm; fill: var(--accentx); }
    
    /* Auto toggle SVGs based on contact labels */
    .cv-contacts .crow[data-label="E-mail"] svg.icon-email,
    .cv-contacts .crow[data-label="Email"] svg.icon-email,
    .cv-contacts .crow[data-label="email"] svg.icon-email { display: inline-block; }
    
    .cv-contacts .crow[data-label="Téléphone"] svg.icon-phone,
    .cv-contacts .crow[data-label="Telephone"] svg.icon-phone,
    .cv-contacts .crow[data-label="Phone"] svg.icon-phone,
    .cv-contacts .crow[data-label="Tél"] svg.icon-phone { display: inline-block; }
    
    .cv-contacts .crow[data-label="Adresse"] svg.icon-address,
    .cv-contacts .crow[data-label="Address"] svg.icon-address,
    .cv-contacts .crow[data-label="Localisation"] svg.icon-address { display: inline-block; }
    
    .cv-contacts .crow[data-label="LinkedIn"] svg.icon-linkedin,
    .cv-contacts .crow[data-label="linkedin"] svg.icon-linkedin { display: inline-block; }
    
    .cv-contacts .crow[data-label="GitHub"] svg.icon-github,
    .cv-contacts .crow[data-label="github"] svg.icon-github { display: inline-block; }
    
    .cv-contacts .crow[data-label="Statut"] svg.icon-status,
    .cv-contacts .crow[data-label="Status"] svg.icon-status,
    .cv-contacts .crow[data-label="Disponibilité"] svg.icon-status { display: inline-block; }

    .cv-contacts .crow[data-label="Portfolio"] svg.icon-portfolio,
    .cv-contacts .crow[data-label="portfolio"] svg.icon-portfolio,
    .cv-contacts .crow[data-label="Site"] svg.icon-portfolio,
    .cv-contacts .crow[data-label="site"] svg.icon-portfolio,
    .cv-contacts .crow[data-label="Website"] svg.icon-portfolio,
    .cv-contacts .crow[data-label="website"] svg.icon-portfolio { display: inline-block; }

    .sec {
      font-family: 'Inter', sans-serif; font-size: 11pt; font-weight: 700;
      letter-spacing: .05em; text-transform: uppercase; color: var(--accentx);
      display: flex; align-items: center; margin: calc(5mm * var(--sp, 1)) 0 calc(2.5mm * var(--sp, 1));
      border-bottom: 1.5px solid var(--accentx); padding-bottom: 1.2mm; width: max-content; min-width: 40mm;
    }
    .side .sec { min-width: 100%; border-bottom-width: 1.5px; }
    
    .crow { display: flex; flex-direction: column; gap: 0.4mm; margin-bottom: calc(2.2mm * var(--sp, 1)); }
    .crow .clabel { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 7.5pt; text-transform: uppercase; color: var(--mutedx); }
    .crow .cvalue { font-size: 8.5pt; word-break: break-word; }

    .skill { margin-bottom: calc(3mm * var(--sp, 1)); display: grid; grid-template-columns: 32mm 1fr; gap: 3.5mm; align-items: baseline; }
    .skill .scat { font-weight: 700; font-size: 8.5pt; color: var(--accentx); text-align: right; text-transform: uppercase; letter-spacing: 0.02em; }
    .skill .sitems { color: #111; font-size: 8.5pt; line-height: 1.45; }

    .langrow { display: flex; align-items: baseline; gap: 2mm; font-size: 8.5pt; margin-bottom: calc(1.5mm * var(--sp, 1)); }
    .langrow::before { content: '•'; color: var(--accentx); font-size: 10pt; }
    .langrow .level { color: var(--mutedx); }

    .cert { font-size: 8.5pt; margin-bottom: calc(1.5mm * var(--sp, 1)); display: flex; gap: 1.5mm; align-items: baseline; }
    .cert::before { content: '•'; color: var(--accentx); font-size: 10pt; }
    .cert .year { color: var(--mutedx); }

    .item { position: relative; margin-bottom: calc(4.5mm * var(--sp, 1)); }
    .item .row { display: flex; justify-content: space-between; align-items: baseline; gap: 4mm; }
    .item h3 { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 10pt; color: #111; }
    .item .dates { font-family: 'Inter', sans-serif; font-size: 8.5pt; color: var(--greenx); font-weight: 600; white-space: nowrap; }
    .item .org { font-size: 9pt; color: #111; font-weight: 700; margin-top: 0.5mm; }
    .points { margin-top: 1.5mm; padding-left: 4mm; }
    .points li { font-size: 8.5pt; color: #111; list-style: none; position: relative; margin-bottom: calc(1mm * var(--sp, 1)); line-height: 1.45; }
    .points li::before { content: '•'; position: absolute; left: -4mm; top: 0; font-size: 10pt; color: var(--accentx); }

    .proj { margin-bottom: calc(3.5mm * var(--sp, 1)); font-size: 8.5pt; position: relative; padding-left: 3.5mm; }
    .proj::before { content: '•'; position: absolute; left: 0; top: 0.2mm; font-size: 10pt; color: var(--accentx); }
    .proj .pname { font-weight: 700; color: #111; display: block; font-size: 9pt; line-height: 1.35; }
    .proj .pstack { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 7.5pt; color: var(--greenx); display: block; margin-top: 0.5mm; line-height: 1.3; }
    .proj .pdesc { color: #333; display: block; margin-top: 0.8mm; line-height: 1.4; font-size: 8pt; }
    
    .side .item h3 { font-size: 9pt; font-weight: 700; color: #111; line-height: 1.35; }
    .side .item .row { display: block; }
    .side .item .dates { display: block; font-family: 'Inter', sans-serif; font-size: 8pt; color: var(--greenx); font-weight: 600; margin-top: 0.5mm; }
    .side .item .org { font-size: 8.5pt; color: var(--mutedx); font-weight: 400; margin-top: 0.5mm; line-height: 1.3; }

    /* ====== Edit mode ====== */
    .edit-only { display: none; }
    body.editing .edit-only { display: inline-flex; }
    body.editing [contenteditable="true"] { outline: 1px dashed rgba(31,107,64,.5); outline-offset: 2px; border-radius: 2px; min-width: 4mm; }
    body.editing [contenteditable="true"]:focus { outline-color: var(--greenx); background: rgba(31,107,64,.08); }
    .rm {
      position: absolute; top: -1mm; right: -1mm; width: 4.5mm; height: 4.5mm;
      align-items: center; justify-content: center; border-radius: 50%;
      background: #fee2e2; color: #b91c1c; font-size: 8pt; line-height: 1; border: 1px solid #fca5a5; cursor: pointer; z-index: 2;
    }
    .crow, .skill, .langrow, .cert, .proj, .item { position: relative; }
    .add {
      align-items: center; gap: 1.5mm; font-family: 'Inter', sans-serif; font-size: 7pt; font-weight: 600;
      letter-spacing: .05em; text-transform: uppercase; color: var(--greenx);
      border: 1px dashed rgba(31,107,64,.5); border-radius: 999px; padding: 0.8mm 2.6mm; margin: 1mm 0 2mm; cursor: pointer; background: transparent;
    }
    .add:hover { background: rgba(31,107,64,.12); }

    /* ====== Print: A4 exact, sheet only ====== */
    @page { size: A4; margin: 0; }
    @media print {
      body { background: #fff !important; }
      .no-print { display: none !important; }
      .edit-only { display: none !important; }
      .sheet-wrap { padding: 0; display: block; }
      .sheet { box-shadow: none; border-radius: 0; width: 210mm; height: 297mm; }
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body class="bg-ink text-mist">

  <!-- ====== Toolbar (screen only) ====== -->
  <header class="no-print fixed top-0 inset-x-0 z-50 border-b border-line bg-ink/85 backdrop-blur">
    <div class="max-w-shell mx-auto px-5 sm:px-8 h-16 flex items-center justify-between gap-4">
      <a href="index.html" class="font-mono text-xs tracking-widest text-muted hover:text-accent transition inline-flex items-center gap-2">
        <i aria-hidden="true">←</i> RETOUR AU SITE
      </a>
      <p class="hidden sm:block font-mono text-[0.65rem] tracking-[0.25em] uppercase text-muted">
        CV — Éditeur · <span id="srv-status" class="text-emerald">…</span>
      </p>
      <div class="flex items-center gap-2">
        <span id="overflow-warn" hidden class="font-mono text-[0.62rem] tracking-widest uppercase text-red-400 border border-red-400/40 rounded-full px-3 py-1.5">⚠ Dépasse 1 page</span>
        <button id="btn-edit" type="button" class="font-mono text-xs tracking-widest uppercase border border-line rounded-full px-4 py-2 text-mist hover:border-accent hover:text-accent transition">
          ✎ Modifier
        </button>
        <button id="btn-cancel" type="button" hidden class="font-mono text-xs tracking-widest uppercase border border-line rounded-full px-4 py-2 text-muted hover:text-mist transition">
          Annuler
        </button>
        <button id="btn-save" type="button" hidden class="font-mono text-xs tracking-widest uppercase rounded-full px-4 py-2 bg-accent text-ink font-medium hover:bg-volt transition">
          ✓ Enregistrer
        </button>
        <button id="btn-reset" type="button" hidden title="Effacer le brouillon enregistré dans ce navigateur et recharger le CV publié" class="font-mono text-xs tracking-widest uppercase border border-amber-400/40 rounded-full px-4 py-2 text-amber-300 hover:border-amber-300 hover:text-amber-200 transition">
          ↺ Réinitialiser le brouillon
        </button>
        <button id="btn-login" type="button" title="Se connecter (mot de passe) pour enregistrer le CV en ligne depuis n’importe quel appareil" class="font-mono text-xs tracking-widest uppercase border border-line rounded-full px-4 py-2 text-mist hover:border-accent hover:text-accent transition">
          ⚙ Connexion
        </button>
        <button id="btn-print" type="button" class="font-mono text-xs tracking-widest uppercase rounded-full px-4 py-2 bg-surface2 border border-line text-mist hover:border-accent hover:text-accent transition">
          ⎙ Imprimer / PDF
        </button>
      </div>
    </div>
  </header>

  <!-- ====== A4 sheet ====== -->
  <main class="sheet-wrap">
    <div class="sheet" id="cv-sheet">

      <!-- Sidebar -->
      <aside class="side">
        <h2 class="sec">Formation</h2>
        <div id="edu-list"></div>
        <button type="button" class="add edit-only" data-add="education">+ formation</button>

        <h2 class="sec">Projets</h2>
        <div id="proj-list"></div>
        <button type="button" class="add edit-only" data-add="projects">+ projet</button>

        <h2 class="sec">Langues</h2>
        <div id="lang-list"></div>
        <button type="button" class="add edit-only" data-add="languages">+ langue</button>

        <h2 class="sec">Intérêts</h2>
        <div id="cert-list"></div>
        <button type="button" class="add edit-only" data-add="certifications">+ intérêt</button>
      </aside>

      <!-- Main column -->
      <section class="mainc">
        <header class="cv-header">
          <h1 class="cv-name" data-edit="identity.name"></h1>
          <p class="cv-title" data-edit="identity.title"></p>
          <div class="cv-contacts-wrap">
            <div id="contact-list" class="cv-contacts"></div>
            <button type="button" class="add edit-only" data-add="contact" style="margin-top:0;">+ contact</button>
          </div>
          <!-- Not using tagline in new design, but keeping for data -->
          <p class="cv-tagline" data-edit="identity.tagline" style="display:none;"></p>
        </header>

        <h2 class="sec">Profil</h2>
        <p style="font-size:9.5pt;color:#222;line-height:1.5;" data-edit="profile"></p>

        <h2 class="sec">Compétences Clés</h2>
        <div id="skills-list"></div>
        <button type="button" class="add edit-only" data-add="skills">+ catégorie</button>

        <h2 class="sec">Expérience Professionnelle</h2>
        <div id="exp-list"></div>
        <button type="button" class="add edit-only" data-add="experience">+ expérience</button>
      </section>

    </div>
  </main>

  <!-- toast -->
  <div id="toast" hidden class="no-print fixed bottom-6 left-1/2 -translate-x-1/2 z-50 font-mono text-xs tracking-wider px-5 py-3 rounded-full border border-line bg-surface text-mist shadow-xl"></div>

  <!-- ====== Micro-templates ====== -->
  <template id="tpl-contact">
    <div class="crow" data-item data-label="{{label}}">
      <button type="button" class="rm edit-only" data-rm aria-label="Supprimer">×</button>
      <span class="cicon">
        <svg class="icon-email" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        <svg class="icon-phone" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
        <svg class="icon-address" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        <svg class="icon-linkedin" viewBox="0 0 24 24"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.8v8.37h2.8v-4.67c0-.25.02-.5.1-.68a1.14 1.14 0 0 1 1-.77c.76 0 1 .58 1 1.42v4.7h2.8M6.5 8.37a1.37 1.37 0 1 0 0-2.75 1.37 1.37 0 0 0 0 2.75M8 18.5V10.13H5V18.5h3z"/></svg>
        <svg class="icon-github" viewBox="0 0 24 24"><path d="M12 2A10 10 0 0 0 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.9-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.9 1.52 2.34 1.07 2.91.83.1-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0 0 12 2z"/></svg>
        <svg class="icon-status" viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg>
        <svg class="icon-portfolio" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      </span>
      <span class="clabel" data-field="label">{{label}}</span>
      <a class="cvalue" data-field="value" target="_blank">{{value}}</a>
    </div>
  </template>

  <template id="tpl-skill">
    <div class="skill" data-item>
      <button type="button" class="rm edit-only" data-rm aria-label="Supprimer">×</button>
      <p class="scat" data-field="category">{{category}}</p>
      <p class="sitems" data-field="items">{{items}}</p>
    </div>
  </template>

  <template id="tpl-lang">
    <div class="langrow" data-item>
      <button type="button" class="rm edit-only" data-rm aria-label="Supprimer">×</button>
      <span data-field="name">{{name}}</span>
      <span class="level" data-field="level">{{level}}</span>
    </div>
  </template>

  <template id="tpl-cert">
    <p class="cert" data-item>
      <button type="button" class="rm edit-only" data-rm aria-label="Supprimer">×</button>
      <span data-field="name">{{name}}</span> — <span class="year" data-field="year">{{year}}</span>
    </p>
  </template>

  <template id="tpl-exp">
    <article class="item" data-item>
      <button type="button" class="rm edit-only" data-rm aria-label="Supprimer">×</button>
      <div class="row">
        <h3 data-field="role">{{role}}</h3>
        <span class="dates" data-field="dates">{{dates}}</span>
      </div>
      <p class="org"><span data-field="company">{{company}}</span> &nbsp; <span data-field="location" style="color:var(--mutedx);font-weight:400;">{{location}}</span></p>
      <ul class="points" data-points></ul>
      <button type="button" class="add edit-only" data-addpoint>+ puce</button>
    </article>
  </template>

  <template id="tpl-point">
    <li data-field="point">{{text}}</li>
  </template>

  <template id="tpl-edu">
    <article class="item" data-item>
      <button type="button" class="rm edit-only" data-rm aria-label="Supprimer">×</button>
      <div class="row">
        <h3 data-field="degree">{{degree}}</h3>
        <span class="dates" data-field="dates">{{dates}}</span>
      </div>
      <p class="org" data-field="school">{{school}}</p>
    </article>
  </template>

  <template id="tpl-proj">
    <div class="proj" data-item>
      <button type="button" class="rm edit-only" data-rm aria-label="Supprimer">×</button>
      <span class="pname" data-field="name">{{name}}</span>
      <span class="pstack" data-field="stack">{{stack}}</span>
      <span class="pdesc" data-field="desc">{{desc}}</span>
    </div>
  </template>

  <script src="assets/js/cv.js"></script>
</body>
</html>
