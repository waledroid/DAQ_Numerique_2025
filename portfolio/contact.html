<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contactez Atanda Abdullahi, Ingénieur Vision par Ordinateur & Edge-AI — disponible pour un entretien : email, LinkedIn, GitHub." />
  <title>Contact — Atanda Abdullahi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/tw-config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://db.onlinewebfonts.com/c/b8cc7a4c2204f4530415a8552c2d827d?family=ANAPOLINO" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="assets/css/site.css" />
  <style>
    .cf-field { background: transparent; border: none; border-bottom: 1px solid var(--line); border-radius: 0; padding: 0.7rem 0.1rem; color: var(--mist); transition: border-color .3s var(--ease); }
    .cf-field::placeholder { color: var(--muted); opacity: .6; }
    .cf-field:focus { outline: none; border-bottom-color: var(--accent); }
  </style>
</head>
<body class="bg-ink text-mist">
  <div id="cursor-dot"></div><div id="cursor-ring"></div>
  <header data-site-nav></header>

  <main>
    <!-- ====== CONTACT ====== -->
    <section class="relative pt-32 pb-24 sm:pb-32 overflow-hidden">
      <div data-glass-bg class="absolute inset-0 -z-10"></div>
      <div class="grid-bg absolute inset-0 pointer-events-none" aria-hidden="true"></div>

      <div class="max-w-shell mx-auto px-5 sm:px-8 relative">
        <div class="max-w-2xl">
          <p class="label" data-reveal>Contact</p>
          <h1 class="font-display font-bold tracking-tight mt-5 leading-[0.95]"
              style="font-size:clamp(2.5rem,6vw,4.5rem)" data-reveal data-delay="1">
            Constru<span class="text-gradient">isons</span>.
          </h1>
          <p class="text-muted text-lg leading-relaxed mt-6" data-reveal data-delay="2">
            Un poste, un projet, une idée&nbsp;? Écrivez-moi.
          </p>
          <p class="chip mt-6" data-reveal data-delay="3">
            <span class="text-accent">●</span> Disponible pour un entretien
          </p>
        </div>

        <div class="panel p-7 sm:p-10 lg:p-12 mt-12" data-reveal data-delay="1">
          <div class="grid lg:grid-cols-[1.3fr_0.7fr] gap-10 lg:gap-14">

            <!-- Form -->
            <form id="contact-form" novalidate class="space-y-6" aria-describedby="form-status">
              <div>
                <label for="cf-name" class="sr-only">Nom</label>
                <input id="cf-name" name="name" type="text" required autocomplete="name"
                  placeholder="Votre nom" class="cf-field w-full" />
                <p class="cf-error hidden mt-1.5 font-mono text-xs text-red-400" data-for="cf-name"></p>
              </div>

              <div>
                <label for="cf-email" class="sr-only">Email</label>
                <input id="cf-email" name="email" type="email" required autocomplete="email"
                  pattern="[^@\s]+@[^@\s]+\.[^@\s]+"
                  placeholder="vous@exemple.com" class="cf-field w-full" />
                <p class="cf-error hidden mt-1.5 font-mono text-xs text-red-400" data-for="cf-email"></p>
              </div>

              <div>
                <label for="cf-subject" class="sr-only">Sujet</label>
                <input id="cf-subject" name="subject" type="text" required
                  placeholder="Sujet du message" class="cf-field w-full" />
                <p class="cf-error hidden mt-1.5 font-mono text-xs text-red-400" data-for="cf-subject"></p>
              </div>

              <div>
                <label for="cf-message" class="sr-only">Message</label>
                <textarea id="cf-message" name="message" rows="4" required
                  placeholder="Votre message…" class="cf-field w-full resize-y"></textarea>
                <p class="cf-error hidden mt-1.5 font-mono text-xs text-red-400" data-for="cf-message"></p>
              </div>

              <!-- Static, no backend: composes a mailto link from the fields on submit. -->
              <div class="flex flex-wrap items-center gap-4 pt-2">
                <button type="submit" class="btn" data-magnetic>
                  <i class="fa-solid fa-paper-plane" aria-hidden="true"></i> Envoyer
                </button>
                <p id="form-status" role="status" aria-live="polite" class="font-mono text-xs text-muted"></p>
              </div>
            </form>

            <!-- Direct links -->
            <div class="lg:border-l lg:border-line lg:pl-14 flex flex-col gap-3">
              <p class="label label--plain text-muted mb-1">Direct</p>
              <a href="mailto:waledroid@gmail.com" class="chip normal-case !justify-start gap-3 py-3 px-4">
                <i class="fa-solid fa-envelope" aria-hidden="true"></i> waledroid@gmail.com
              </a>
              <a href="https://linkedin.com/in/waledroid" target="_blank" rel="noopener" class="chip normal-case !justify-start gap-3 py-3 px-4">
                <i class="fa-brands fa-linkedin-in" aria-hidden="true"></i> linkedin.com/in/waledroid
              </a>
              <a href="https://github.com/waledroid" target="_blank" rel="noopener" class="chip normal-case !justify-start gap-3 py-3 px-4">
                <i class="fa-brands fa-github" aria-hidden="true"></i> github.com/waledroid
              </a>
            </div>

          </div>
        </div>
      </div>
    </section>
  </main>

  <footer data-site-footer></footer>

  <!-- contact form → mailto (static, no backend) -->
  <script>
    (function () {
      var form = document.getElementById('contact-form');
      if (!form) return;
      var status = document.getElementById('form-status');
      var MAILTO = 'waledroid@gmail.com';
      var EMAIL_RE = /^[^@\s]+@[^@\s]+\.[^@\s]+$/;

      function field(id) { return document.getElementById(id); }
      function errEl(id) { return form.querySelector('.cf-error[data-for="' + id + '"]'); }

      function showError(id, msg) {
        var input = field(id), el = errEl(id);
        if (el) { el.textContent = msg; el.classList.remove('hidden'); }
        if (input) { input.setAttribute('aria-invalid', 'true'); input.classList.add('border-red-400'); }
      }
      function clearError(id) {
        var input = field(id), el = errEl(id);
        if (el) { el.textContent = ''; el.classList.add('hidden'); }
        if (input) { input.removeAttribute('aria-invalid'); input.classList.remove('border-red-400'); }
      }

      ['cf-name', 'cf-email', 'cf-subject', 'cf-message'].forEach(function (id) {
        var input = field(id);
        if (input) input.addEventListener('input', function () { clearError(id); });
      });

      function validate() {
        var ok = true;
        var name = field('cf-name').value.trim();
        var email = field('cf-email').value.trim();
        var subject = field('cf-subject').value.trim();
        var message = field('cf-message').value.trim();

        if (!name) { showError('cf-name', 'Merci d\'indiquer votre nom.'); ok = false; }
        if (!email) { showError('cf-email', 'Merci d\'indiquer votre email.'); ok = false; }
        else if (!EMAIL_RE.test(email)) { showError('cf-email', 'Adresse email invalide.'); ok = false; }
        if (!subject) { showError('cf-subject', 'Merci d\'indiquer un sujet.'); ok = false; }
        if (!message) { showError('cf-message', 'Merci d\'écrire un message.'); ok = false; }

        return ok ? { name: name, email: email, subject: subject, message: message } : null;
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        status.textContent = '';
        var data = validate();
        if (!data) {
          status.textContent = 'Veuillez corriger les champs en surbrillance.';
          status.classList.add('text-red-400');
          var firstErr = form.querySelector('[aria-invalid="true"]');
          if (firstErr) firstErr.focus();
          return;
        }
        status.classList.remove('text-red-400');
        var body = 'Nom : ' + data.name + '\n' +
                   'Email : ' + data.email + '\n\n' +
                   data.message;
        var href = 'mailto:' + MAILTO +
                   '?subject=' + encodeURIComponent(data.subject) +
                   '&body=' + encodeURIComponent(body);
        status.textContent = 'Ouverture de votre messagerie…';
        window.location.href = href;
      });
    })();
  </script>

  <!-- libs (order matters) -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
  <script type="importmap">
  { "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  } }
  </script>
  <script type="module" src="assets/js/glass-bg.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
